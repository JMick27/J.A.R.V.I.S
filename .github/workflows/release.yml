name: Build JARVIS Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        default: 0.1.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Configure public AI service
        shell: pwsh
        env:
          AI_PROXY_URL: ${{ vars.JARVIS_AI_PROXY_URL }}
        run: |
          if (-not $env:AI_PROXY_URL) { throw "Repository variable JARVIS_AI_PROXY_URL is not configured." }
          @{ ai_proxy_url = $env:AI_PROXY_URL } | ConvertTo-Json | Set-Content distribution_config.json -Encoding utf8
          $version = $env:RELEASE_VERSION -replace '^v', ''
          (Get-Content jarvis.py -Raw) -replace 'APP_VERSION = "[^"]+"', "APP_VERSION = `"$version`"" | Set-Content jarvis.py -Encoding utf8

      - name: Build application and launcher
        run: |
          pyinstaller --noconfirm --clean "JARVIS Desktop Assistant.spec"
          pyinstaller --noconfirm --clean "JARVIS Launcher.spec"

      - name: Package and hash release
        shell: pwsh
        run: |
          $version = $env:RELEASE_VERSION -replace '^v', ''
          @{ version = $version } | ConvertTo-Json | Set-Content "dist/JARVIS Desktop Assistant/version.json" -Encoding utf8
          Compress-Archive -Path "dist/JARVIS Desktop Assistant/*" -DestinationPath "dist/JARVIS-win-x64.zip" -Force
          $sha = (Get-FileHash "dist/JARVIS-win-x64.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          @{ version = $version; asset = "JARVIS-win-x64.zip"; sha256 = $sha } | ConvertTo-Json | Set-Content "dist/release-manifest.json" -Encoding utf8

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-Windows-${{ env.RELEASE_VERSION }}
          path: |
            dist/JARVIS-win-x64.zip
            dist/release-manifest.json
            dist/JARVIS Launcher.exe

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/JARVIS-win-x64.zip
            dist/release-manifest.json
            dist/JARVIS Launcher.exe
